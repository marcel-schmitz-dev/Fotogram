<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="style.css" />

        <link
            href="https://fonts.googleapis.com/css2?family=Figtree:wght@800&display=swap"
            rel="stylesheet"
        />
    </head>

    <body>
        <header>
            <div class="header-container">
                <img
                    src="./assets/icon/farb_icon.png"
                    alt="Logo"
                    class="logo"
                />
                <h1>Fotogram</h1>
            </div>
        </header>

        <main>
            <h2 class="gallery-title">Your personal photo album</h2>
            <div class="gallery" id="gallery"></div>
        </main>

        <div id="overlay" class="overlay hidden" onclick="closeOverlay()">
            <div class="overlay-window" onclick="event.stopPropagation()">
                <div class="overlay-header">
                    <span id="imageTitle">Alaska-810433_1280</span>
                    <button class="close-icon" onclick="closeOverlay()">
                        ×
                    </button>
                </div>
                <img id="largeImage" src="" alt="Großansicht" />
                <div class="overlay-footer">
                    <button class="nav-btn" onclick="prevImage(event)">
                        ←
                    </button>
                    <span id="imageCounter">1/12</span>
                    <button class="nav-btn" onclick="nextImage(event)">
                        →
                    </button>
                </div>
            </div>
        </div>

        <footer>
            <div class="footer-top">
                <img
                    src="./assets/icon/Icon.png"
                    alt="Footer-logo"
                    class="footer-logo"
                />
                <h3>Developer<br />Akademie</h3>
            </div>

            <p>&copy; 2026 Developer Akademie GmbH</p>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
