<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fotogram</title>
        <link rel="icon" type="image/png" href="./assets/icon/farb_icon.png" />
        <link rel="stylesheet" href="style.css" />

        <link
            href="https://fonts.googleapis.com/css2?family=Figtree:wght@800&display=swap"
            rel="stylesheet"
        />
    </head>

    <body>
        <header>
            <div class="content-wrapper header-container">
                <img
                    src="./assets/icon/farb_icon.png"
                    alt="Logo"
                    class="logo"
                />
                <h2>Fotogram</h2>
            </div>
        </header>

        <main>
            <div class="content-wrapper">
                <h1 class="gallery-title">Your personal photo album</h1>
                <div class="gallery" id="gallery"></div>
            </div>
        </main>

        <div id="overlay" class="overlay hidden" onclick="closeOverlay()">
            <div class="overlay-window" onclick="event.stopPropagation()">
                <div class="overlay-header">
                    <span id="imageTitle">Alaska-810433_1280</span>
                    <button class="close-icon" onclick="closeOverlay()">
                        &times;
                    </button>
                </div>
                <img id="largeImage" src="" alt="Großansicht" />
                <div class="overlay-footer">
                    <button
                        id="prevBtn"
                        class="nav-btn"
                        onclick="prevImage(event)"
                    >
                        ←
                    </button>
                    <span id="imageCounter">1/12</span>
                    <button
                        id="nextBtn"
                        class="nav-btn"
                        onclick="nextImage(event)"
                    >
                        →
                    </button>
                </div>
            </div>
        </div>

        <footer>
            <div class="content-wrapper">
                <div class="footer-top">
                    <img
                        src="./assets/icon/Icon.png"
                        alt="Footer-logo"
                        class="footer-logo"
                    />
                    <h3>Developer<br />Akademie</h3>
                </div>
            </div>

            <div class="content-wrapper">
                <p>&copy; 2026 Developer Akademie GmbH</p>
            </div>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
